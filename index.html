<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + Vue + Typescript App</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #1e1f22;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1e1f22;
        color: #9aa0a6;
        font: 12px/1.2 "Segoe UI", Arial, sans-serif;
        letter-spacing: 0.3px;
      }
      #boot-splash .dot {
        width: 6px;
        height: 6px;
        margin-right: 8px;
        border-radius: 50%;
        background: #4f9cff;
        box-shadow: 0 0 0 0 rgba(79, 156, 255, 0.55);
        animation: pulse 1.15s ease-in-out infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(79, 156, 255, 0.55); }
        70% { box-shadow: 0 0 0 9px rgba(79, 156, 255, 0); }
        100% { box-shadow: 0 0 0 0 rgba(79, 156, 255, 0); }
      }
    </style>
  </head>

  <body>
    <div id="boot-splash"><span class="dot"></span>Loading workspace...</div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
